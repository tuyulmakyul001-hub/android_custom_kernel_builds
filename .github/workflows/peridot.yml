name: Build LOS Kernel (Peridot)
on: 
  workflow_dispatch:
      inputs:
        ref:
          type: string
          description: reference head
          required: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Update Ubuntu
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get upgrade -y

    - name: Setup zram as swap
      shell: bash
      run: |
        sudo swapoff -a
        sudo rm -f /mnt/swapfile
        sudo apt-get install -y "linux-modules-extra-$(uname -r)"
        [ -f /dev/zram0 ] || sudo modprobe zram
        echo "Waiting 5s for zram module to initialize"
        sleep 5
        sudo zramctl --find --algorithm lz4 --size 24576M
        sudo mkswap /dev/zram0
        sudo swapon -d --priority 100 /dev/zram0
        sudo sysctl -w vm.swappiness=180
        sudo sysctl -w vm.watermark_boost_factor=0
        sudo sysctl -w vm.watermark_scale_factor=125
        sudo sysctl -w vm.page-cluster=0
        sudo sysctl -w vm.min_free_kbytes=131072
        sleep 1
        sudo swapon --show
        sudo zramctl

    - name: Checkout local repository
      uses: actions/checkout@v4
      with:
        path: builder

    - name: Checkout kernel source
      uses: actions/checkout@v5
      with:
        repository: tuyulmakyul001-hub/android_kernel_xiaomi_sm8635
        path: source
        ref: lineage-23.2

    - name: Integrate KernelSU Next
      shell: bash
      run: |
        cd ${{ github.workspace }}/source
        curl -LSs \
          "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
          | bash -s dev

        # Verify the driver directory was actually created
        KSUN_DIR=$(find . -maxdepth 1 -type d -name "KernelSU*" | head -1)
        if [ -z "${KSUN_DIR}" ]; then
          echo "::error::KSUNext setup finished but no KernelSU* directory found!"
          echo "Source root contents:"
          ls -la .
          exit 1
        fi
        echo "KSUNext directory: ${KSUN_DIR}"
        # Expose path for the next step
        echo "KSUN_DIR_NAME=$(basename ${KSUN_DIR})" >> $GITHUB_ENV

    - name: Integrate SUSFS
      shell: bash
      run: |
        SUSFS_BRANCH="gki-android14-6.1"
        KERNEL_DIR="${{ github.workspace }}/source"
        SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
        # KSUNext directory name discovered in the previous step
        KSUN_DIR="${KERNEL_DIR}/${{ env.KSUN_DIR_NAME }}"

        git clone https://gitlab.com/simonpunk/susfs4ksu.git \
          --depth=1 -b "${SUSFS_BRANCH}" "${SUSFS_DIR}"

        # ── 1. Apply main kernel patch ─────────────────────────────────────
        # Allow partial failure; namespace.c conflict handled below.
        cd "${KERNEL_DIR}"
        set +e
        patch -p1 --fuzz=3 --ignore-whitespace \
          < "${SUSFS_DIR}/kernel_patches/50_add_susfs_in_${SUSFS_BRANCH}.patch"
        set -e

        # ── 2. Fix fs/namespace.c include conflict (Qualcomm OEM kernels) ──
        # Hunk #1 fails because the OEM include block differs from stock GKI.
        # SUSFS only needs "#include <linux/susfs.h>" added to that block.
        if [ -f "${KERNEL_DIR}/fs/namespace.c.rej" ]; then
          echo "::warning::namespace.c hunk #1 conflict — injecting include manually"
          echo "--- Rejected hunk ---"
          cat "${KERNEL_DIR}/fs/namespace.c.rej"
          echo "---------------------"
          if ! grep -q "linux/susfs.h" "${KERNEL_DIR}/fs/namespace.c"; then
            LAST_INC=$(awk '/^#include/{last=NR} NR>80{exit} END{print last}' \
                       "${KERNEL_DIR}/fs/namespace.c")
            sed -i "${LAST_INC}a #include <linux\/susfs.h>" "${KERNEL_DIR}/fs/namespace.c"
            echo "Inserted #include <linux/susfs.h> after line ${LAST_INC}"
          fi
          rm -f "${KERNEL_DIR}/fs/namespace.c.rej"
        fi

        # ── 3. Abort on any other unexpected rejects ───────────────────────
        REMAINING=$(find "${KERNEL_DIR}" -name "*.rej" | wc -l)
        if [ "${REMAINING}" -gt 0 ]; then
          echo "::error::Unexpected patch rejects:"
          find "${KERNEL_DIR}" -name "*.rej" \
            -exec sh -c 'echo "=== {} ==="; cat "{}"' \;
          exit 1
        fi

        # ── 4. Patch the KSUNext driver to wire up SUSFS ──────────────────
         # Patch the KernelSU-Next driver with error handling
         echo "Patching KSUNext driver at: ${KSUN_DIR}"
         cd "${KSUN_DIR}"
         set +e
         patch -p1 --fuzz=3 \
           < "${SUSFS_DIR}/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
         set -e

         # Handle KernelSU-Next patch failures gracefully
         # (Log warnings but continue if specific files can be manually patched)
         if find "${KSUN_DIR}" -name "*.rej" | grep -q .; then
           echo "::warning::KernelSU-Next patch conflicts detected. Manual review may be needed."
           find "${KSUN_DIR}" -name "*.rej" \
             -exec sh -c 'echo "=== {} ==="; cat "{}"' \;
           # Optionally clean up .rej files if you want to proceed anyway:
           # find "${KSUN_DIR}" -name "*.rej" -delete
         fi

         # Only fail on kernel directory rejects (critical)
         KERNEL_REJECTS=$(find "${KERNEL_DIR}" -name "*.rej" | wc -l)
         if [ "${KERNEL_REJECTS}" -gt 0 ]; then
           echo "::error::Critical patch rejects in kernel source:"
           find "${KERNEL_DIR}" -name "*.rej" \
             -exec sh -c 'echo "=== {} ==="; cat "{}"' \;
           exit 1
         fi

        # ── 5. Copy SUSFS source files into the kernel tree ───────────────
        cp "${SUSFS_DIR}/kernel_patches/fs/susfs.c"            "${KERNEL_DIR}/fs/"
        cp "${SUSFS_DIR}/kernel_patches/include/linux/susfs.h" "${KERNEL_DIR}/include/linux/"

        echo "SUSFS integration complete (branch: ${SUSFS_BRANCH})"

    - name: Build Kernel in Docker (ArchLinux)
      uses: ./builder/actions/peridot
      
    - name: Get datetime
      id: datetime
      shell: bash
      run: echo "datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
      
    - name: Generate Artifact
      uses: actions/upload-artifact@v6
      with:
        name: peridot_ksun_susfs_${{ steps.datetime.outputs.datetime }}
        path: ${{ github.workspace }}/builder/actions/peridot/AnyKernel3/*
